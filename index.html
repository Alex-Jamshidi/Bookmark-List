<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Bookmark-List</title>
</head>
<body>

  <main>
    <header>
      <h1>Bookmark-List</h1>
    </header>

    <section>
      <h2 id="user-heading">Select a User</h2>
      <div>
        <label for="user-select">Choose User:</label>
        <select id="user-select">
          <option value="" disabled selected>Select a User</option>
          <option value="1">Alex Jamshidi</option>
          <option value="2">Fayaz</option>
          <option value="3">Mohsen</option>
          <option value="4">Carlos</option>
          <option value="5">Abdul</option>
        </select>
      </div>
    </section>

    <section>
      <h2 id="form-heading">Add New Bookmark</h2>
      <form id="bookmark-form">
        <div>
          <label for="bookmark-url">URL</label>
          <input type="url" id="bookmark-url" required>
        </div>
        <div>
          <label for="bookmark-title">Title</label>
          <input type="text" id="bookmark-title" required>
        </div>
        <div>
          <label for="bookmark-desc">Description</label>
          <textarea id="bookmark-desc" required rows="3"></textarea>
        </div>
        <button type="submit">Add Bookmark</button>
      </form>
    </section>

    <section aria-labelledby="bookmarks-heading">
      <h2 id="bookmarks-heading">Bookmarks</h2>
      <div id="bookmarks-container"></div>
    </section>

     <template id="bookmark-template">
      <div class="bookmark-item">
        <h3 class="bookmark-title"></h3>
        <p class="bookmark-description"></p>
        <button class="like-btn">Like (<span class="like-count">0</span>)</button>
        <button class="delete-btn">Delete</button>
        <p class="bookmark-timestamp"></p>
      </div>
    </template>

  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
